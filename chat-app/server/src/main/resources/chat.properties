# Server
server.port=5000
server.pool.size=50
server.max.connections=200
server.backlog=10

# Heartbeat
heartbeat.interval.seconds=15
heartbeat.timeout.seconds=20

# Message queue per client
client.queue.capacity=100

# Room history
room.history.capacity=100

# Reconnection (client)
reconnect.max.attempts=6
reconnect.base.delay.seconds=1
reconnect.max.delay.seconds=32

# Logging
log.level=INFO
log.file=logs/chat-server.log