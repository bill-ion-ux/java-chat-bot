version: "3.9"

services:
  chat-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: chat-server
    restart: unless-stopped
    ports:
      - "5000:5000"         # TCP chat port
    volumes:
      - ./resources/chat.properties:/app/chat.properties:ro
      - chat-logs:/app/logs
    environment:
      - SERVER_PORT=5000
      - POOL_SIZE=50
      - HEARTBEAT_INTERVAL=15
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5000"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  chat-logs: